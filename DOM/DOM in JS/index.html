<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="div">
        I am a container.
    </div>
    <script>
        document.title="DOM in Js"
        console.log(document.body)
        console.log(window.document.body)
        document.body.style.backgroundColor="Pink"
    </script>
</body>
</html>
<!-- DOM stands for Document Object Model
 DOM represents the HTML page — it lets JavaScript access and change the content of a webpage. -->
 <!-- BOM stands for Browser Object Model 
  BOM represents the browser window — it lets JavaScript interact with the browser itself.-->
