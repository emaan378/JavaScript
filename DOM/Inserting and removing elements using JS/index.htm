<!-- 1. document.querySelector(".box")
javascript// Output:
<div class="box">Hey I am a box</div>
Returns the entire HTML element itself — the actual DOM node/object. You can use it to manipulate the element further (change style, add events, etc.)

2. document.querySelector(".box").innerHTML
javascript// Output:
Hey I am a box
Returns only the HTML content inside the element as a string. If there were nested tags inside, it would include them:

3. document.querySelector(".container").innerText
javascript// Output:
Hey I am a box
Hey I am a box
Returns the visible text content of the element and all its children — but no HTML tags, just plain text as it appears on screen.

4. document.querySelector(".container").outerText
javascript// Output:
Hey I am a box
Hey I am a box
In most cases gives the same result as innerText. The difference is:

innerText → text inside the element
outerText → text including the element itself (but since divs have no extra text of their own, output looks the same here) -->
